name: Update Flock Camera Data

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Country filter (e.g., US). Leave empty for worldwide.'
        required: false
        default: ''
      full_rescan:
        description: 'Force full rescan (ignore incremental state)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore incremental scan state from previous runs.
      # scan_state.json is gitignored (local checkpoint), so we persist it
      # across CI runs via the Actions cache. The cache key rotates monthly
      # to force a periodic full rescan; restore-keys ensures we always pick
      # up the most recent state even after key rotation.
      - name: Restore scan state cache
        if: ${{ github.event.inputs.full_rescan != 'true' }}
        uses: actions/cache@v4
        with:
          path: data/scan_state.json
          key: scan-state-${{ hashFiles('data/flock_ouis.csv') }}-${{ github.run_id }}
          restore-keys: |
            scan-state-${{ hashFiles('data/flock_ouis.csv') }}-

      - name: Query WiGLE for Flock cameras (incremental)
        env:
          WIGLE_API_NAME: ${{ secrets.WIGLE_API_NAME }}
          WIGLE_API_TOKEN: ${{ secrets.WIGLE_API_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country ${{ github.event.inputs.country }}"
          fi
          if [ "${{ github.event.inputs.full_rescan }}" = "true" ]; then
            ARGS="$ARGS --full-rescan"
          fi
          python3 scripts/wigle_query.py $ARGS

      - name: Check for data changes
        id: check
        run: |
          git diff --quiet data/ README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flock_cameras.geojson data/flock_cameras.csv data/scan_stats.json data/by_oui/ README.md
          CAMERAS=$(python3 -c "import json; d=json.load(open('data/scan_stats.json')); print(d.get('total_cameras', 0))")
          NEW=$(python3 -c "import json; d=json.load(open('data/scan_stats.json')); print(d.get('new_this_scan', 0))")
          git commit -m "data: update Flock camera data ($CAMERAS total, +$NEW new) [skip ci]"
          git push

  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get latest after data commit

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
