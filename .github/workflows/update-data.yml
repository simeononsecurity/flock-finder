name: Update Flock Camera Data

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Country filter (e.g., US). Leave empty for worldwide.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Query WiGLE for Flock cameras (all OUIs, full pagination)
        env:
          WIGLE_API_NAME: ${{ secrets.WIGLE_API_NAME }}
          WIGLE_API_TOKEN: ${{ secrets.WIGLE_API_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.country }}" ]; then
            ARGS="$ARGS --country ${{ github.event.inputs.country }}"
          fi
          python3 scripts/wigle_query.py $ARGS

      - name: Check for data changes
        id: check
        run: |
          git diff --quiet data/ README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flock_cameras.geojson data/flock_cameras.csv data/scan_stats.json README.md
          CAMERAS=$(python3 -c "import json; d=json.load(open('data/scan_stats.json')); print(d.get('total_cameras', 0))")
          NEW=$(python3 -c "import json; d=json.load(open('data/scan_stats.json')); print(d.get('new_this_scan', 0))")
          git commit -m "data: update Flock camera data ($CAMERAS total, +$NEW new) [skip ci]"
          git push

  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get latest after data commit

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
